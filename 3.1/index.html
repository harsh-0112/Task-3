<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <a href=""><img src="./logo.png" alt="" /></a>
      <div class="center">
        <p>About</p>
        <p>Watch Now</p>
        <p>Actors</p>
        <p>Contact</p>
      </div>
      <i class="ri-menu-3-line"></i>
    </nav>

    <br />
    <br />
    <br />

    <!-- MAIN -->
    <main>
      <div class="left">
        <div class="img">
          <img class="star1" src="./star1.png" alt="star1" />
          <img class="star2" src="./star2.png" alt="star1" />
        </div>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br />Season 1: 9 Episodes
        </p>

        <div class="buttons">
          <button class="play">
            <i class="ri-play-fill"></i>
            <p>Play Now</p>
          </button>

          <button class="trailer">
            <i class="ri-play-line"></i>
            <p>Watch Trailer</p>
          </button>
        </div>

        <h1>GAME</h1>
      </div>
      <div class="right">
        <img src="./guard.png" alt="" />
        <div class="socials">
          <i class="ri-twitter-line"></i>
          <i class="ri-instagram-line"></i>
          <i class="ri-facebook-fill"></i>
        </div>
      </div>
      <div class="squid"><h1>SQUID</h1></div>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="img"><i class="ri-play-fill"></i></div>
      <div class="img"><i class="ri-play-fill"></i></div>
      <div class="img"><i class="ri-play-fill"></i></div>
    </footer>
  </body>
</html>
